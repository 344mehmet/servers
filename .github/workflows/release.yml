name: Automatic Release Creation

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Get last release hash
        id: last_release
        run: |
          echo "Getting last release hash..."
          echo "hash=$(git log -n 1 --pretty=format:'%H')" >> $GITHUB_OUTPUT
          
      - name: Generate Release Notes
        run: |
          echo "Generating release notes..."
          git log --pretty=format:'- %s' ${{ steps.last_release.outputs.hash }}..HEAD > RELEASE_NOTES.md
          cat RELEASE_NOTES.md
          
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ### Changes
            
            $(cat RELEASE_NOTES.md)
            
          draft: false
          prerelease: false
        
      - name: Create Metadata
        run: |
          echo "Creating release metadata..."
          echo "Release created successfully: ${{ steps.create_release.outputs.upload_url }}"
          echo "Release version: ${{ github.ref_name }}"
          echo "Release date: ${{ github.event.head_commit.timestamp }}"
          
      - name: Push Docker Image
        if: ${{ success() }}
        run: |
          docker tag mcp-server:latest ghcr.io/344mehmet/servers:${{ github.ref_name }}
          docker push ghcr.io/344mehmet/servers:${{ github.ref_name }}
